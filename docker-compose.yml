---
services:
  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--appendonly", "yes",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "allkeys-lru",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
