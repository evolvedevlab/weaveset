# check .env.production
# Run: docker compose up -d
# user needs to be set and should have access to site dir
---
services:
  redis:
    image: redis:8-alpine
    container_name: wearedis
    networks:
      - weaveset
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass", "${REDIS_PASSWORD}",
        "--appendonly", "yes",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "noeviction"
      ]
    volumes:
      - redis_data:/data

  apiserver:
    image: weaveset-apiserver:latest
    container_name: apiserver
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - weaveset
    ports:
      - "3000:3000"
    user: "1000:1000"
    environment:
      - ENVIRONMENT=production
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./site:/app/site

  worker:
    image: weaveset-worker:latest
    container_name: worker
    restart: unless-stopped
    networks:
      - weaveset
    depends_on:
      - redis
    user: "1000:1000"
    environment:
      - ENVIRONMENT=production
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./site:/app/site

  rebuilder:
    image: weaveset-rebuild:latest
    container_name: rebuilder
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - FILEPATH=/app/site/content/list/.changed
    volumes:
      - ./site:/app/site

  prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - prometheus_data:/prometheus
      command:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--storage.tsdb.retention.time=7d"
        - "--storage.tsdb.retention.size=2GB"
        - "--storage.tsdb.wal-compression"
        - "--query.max-concurrency=5"
        - "--query.max-samples=5000000"
      networks:
        - weaveset
      restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    networks:
      - weaveset
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail-positions:/tmp
    command: -config.file=/etc/promtail/config.yml

  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - weaveset
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - weaveset
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  redis_data:
  grafana_data:
  promtail-positions:
  prometheus_data:
  loki_data:

networks:
  weaveset:
    external: true
