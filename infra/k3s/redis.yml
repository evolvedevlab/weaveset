apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: weaveset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          command: ["/bin/sh", "-c"]
          args:
            - >
              redis-server
              --requirepass $REDIS_PASSWORD
              --appendonly yes
              --maxmemory 256mb
              --maxmemory-policy noeviction
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              value: "npaulweaveset"
          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: weaveset
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
