name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract tag name without "v"
        id: tag
        run: |
          TAG=${GITHUB_REF##*/}
          TAG_WITHOUT_V=$(echo $TAG | sed 's/^v//')
          echo "TAG=$TAG_WITHOUT_V" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ steps.tag.outputs.TAG }} \
            -f infra/docker/simple.Dockerfile .

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ steps.tag.outputs.TAG }}
